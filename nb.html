<!DOCTYPE html>
<html>
<head>
  <title>居中页面</title>
  <style>
    /* 设置整个页面为上下左右全居中 */
    body {
      display: flex;             /* 启用弹性盒模型 */
      justify-content: center;   /* 水平居中 */
      align-items: center;       /* 垂直居中 */
      height: 100vh;             /* 设置为视口高度 */
      margin: 0;                 /* 去掉默认的外边距 */
    }

    h1 {
      font-size: 100px;          /* 设置标题大小 */
      text-align: center;        /* 文字水平居中（仅对多行文本作用） */
    }
  </style>
</head>
<body>
  <h1>女神牛逼</h1>
</body>
</html>
